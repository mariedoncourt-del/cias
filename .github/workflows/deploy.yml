name: Deploy CIAS to OVH
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp
      
      - name: FTP Deploy - Stagiaire.php
        run: lftp -c "open -u ${{ secrets.OVH_FTP_USER }},${{ secrets.OVH_FTP_PASS }} ${{ secrets.OVH_FTP_SERVER }}; put -O /www/cias/application/controllers/ application/controllers/Stagiaire.php"
      
      - name: FTP Deploy - Config notifications
        run: lftp -c "open -u ${{ secrets.OVH_FTP_USER }},${{ secrets.OVH_FTP_PASS }} ${{ secrets.OVH_FTP_SERVER }}; put -O /www/cias/application/config/ application/config/cias_notifications.php"
      
      - name: FTP Deploy - Header / Footer
        run: lftp -c "open -u ${{ secrets.OVH_FTP_USER }},${{ secrets.OVH_FTP_PASS }} ${{ secrets.OVH_FTP_SERVER }}; put -O /www/cias/application/views/includes/ application/views/includes/header.php; put -O /www/cias/application/views/includes/ application/views/includes/footer.php"
      
      - name: FTP Deploy - Assets JS
        run: lftp -c "open -u ${{ secrets.OVH_FTP_USER }},${{ secrets.OVH_FTP_PASS }} ${{ secrets.OVH_FTP_SERVER }}; put -O /www/cias/assets/ assets/cias-ameliorations.js"
      
      - name: FTP Deploy - Assets CSS
        run: lftp -c "open -u ${{ secrets.OVH_FTP_USER }},${{ secrets.OVH_FTP_PASS }} ${{ secrets.OVH_FTP_SERVER }}; mkdir -p /www/cias/assets/dist/css; put -O /www/cias/assets/dist/css/ assets/dist/css/cias-ameliorations.css"
