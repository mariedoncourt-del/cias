name: Deploy CIAS to OVH
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: FTP Deploy via FTPS
        env:
          FTP_HOST: ${{ secrets.OVH_FTP_SERVER }}
          FTP_USER: ${{ secrets.OVH_FTP_USER }}
          FTP_PASS: ${{ secrets.OVH_FTP_PASS }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            set net:timeout 30
            set net:max-retries 3
            open -u $FTP_USER,$FTP_PASS $FTP_HOST
            put -O /www/cias/application/controllers/ application/controllers/Stagiaire.php
            put -O /www/cias/application/config/ application/config/cias_notifications.php
            put -O /www/cias/application/views/includes/ application/views/includes/header.php
            put -O /www/cias/application/views/includes/ application/views/includes/footer.php
            put -O /www/cias/assets/ assets/cias-ameliorations.js
            mkdir -p /www/cias/assets/dist/css
            put -O /www/cias/assets/dist/css/ assets/dist/css/cias-ameliorations.css
            quit
          "
